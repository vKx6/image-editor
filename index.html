<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Editor - Mosaic & Fill & Fanza</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #4fc3f7;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 20px;
      padding: 15px;
      background: #16213e;
      border-radius: 8px;
    }
    .toolbar button, .toolbar input[type="file"], .toolbar label {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .toolbar button {
      background: #4fc3f7;
      color: #1a1a2e;
    }
    .toolbar button:hover {
      background: #29b6f6;
    }
    .toolbar button.active {
      background: #ff6b6b;
      color: #fff;
    }
    .toolbar button:disabled {
      background: #555;
      cursor: not-allowed;
    }
    .toolbar label {
      background: #7c4dff;
      color: #fff;
      display: inline-block;
    }
    .toolbar label:hover {
      background: #651fff;
    }
    .toolbar input[type="file"] {
      display: none;
    }
    .options {
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
    }
    .options label {
      background: transparent;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .options input[type="range"] {
      width: 100px;
    }
    .options input[type="color"] {
      width: 40px;
      height: 30px;
      border: none;
      cursor: pointer;
    }
    .canvas-container {
      position: relative;
      display: flex;
      justify-content: center;
      background: #0f0f1a;
      border-radius: 8px;
      padding: 20px;
      min-height: 400px;
    }
    #canvas {
      max-width: 100%;
      cursor: crosshair;
      border: 2px solid #333;
    }
    .selection-box {
      position: absolute;
      border: 2px dashed #ff6b6b;
      background: rgba(255, 107, 107, 0.1);
      pointer-events: none;
    }
    .info {
      text-align: center;
      margin-top: 15px;
      color: #888;
      font-size: 14px;
    }
    .shortcuts {
      margin-top: 20px;
      padding: 15px;
      background: #16213e;
      border-radius: 8px;
      font-size: 13px;
    }
    .shortcuts h3 {
      margin-bottom: 10px;
      color: #4fc3f7;
    }
    .shortcuts ul {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 5px;
    }
    .shortcuts kbd {
      background: #333;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: monospace;
    }
    /* Tab navigation */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
    }
    .tab-btn {
      padding: 12px 30px;
      border: none;
      background: #16213e;
      color: #888;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s;
      border-bottom: 3px solid transparent;
    }
    .tab-btn:first-child {
      border-radius: 8px 0 0 0;
    }
    .tab-btn:last-child {
      border-radius: 0 8px 0 0;
    }
    .tab-btn.active {
      background: #1e3a5f;
      color: #4fc3f7;
      border-bottom-color: #4fc3f7;
    }
    .tab-btn:hover:not(.active) {
      background: #1a2a4a;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    /* Fanza specific styles */
    .fanza-container {
      background: #16213e;
      border-radius: 8px;
      padding: 20px;
    }
    .fanza-upload {
      border: 2px dashed #4fc3f7;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 20px;
    }
    .fanza-upload:hover {
      background: rgba(79, 195, 247, 0.1);
    }
    .fanza-upload.dragover {
      background: rgba(79, 195, 247, 0.2);
      border-color: #29b6f6;
    }
    .fanza-preview {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .fanza-preview-item {
      background: #0f0f1a;
      border-radius: 8px;
      padding: 15px;
      text-align: center;
    }
    .fanza-preview-item h4 {
      margin-bottom: 10px;
      color: #4fc3f7;
    }
    .fanza-preview-item canvas {
      max-width: 100%;
      border: 2px solid #333;
    }
    .fanza-controls {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 20px;
    }
    .fanza-controls label {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .fanza-controls input[type="range"] {
      width: 150px;
    }
    .fanza-btn {
      padding: 12px 24px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .fanza-btn-primary {
      background: #4fc3f7;
      color: #1a1a2e;
    }
    .fanza-btn-primary:hover {
      background: #29b6f6;
    }
    .fanza-btn-primary:disabled {
      background: #555;
      cursor: not-allowed;
    }
    .fanza-btn-success {
      background: #66bb6a;
      color: #fff;
    }
    .fanza-btn-success:hover {
      background: #4caf50;
    }
    .fanza-info {
      background: #0f0f1a;
      padding: 10px 15px;
      border-radius: 5px;
      font-size: 13px;
      color: #aaa;
    }
    .fanza-info strong {
      color: #4fc3f7;
    }
    .crop-area {
      position: relative;
      display: inline-block;
      cursor: move;
    }
    .crop-overlay {
      position: absolute;
      border: 2px solid #ff6b6b;
      background: rgba(255, 107, 107, 0.2);
      cursor: move;
    }
    .quality-display {
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Image Editor</h1>

    <div class="tabs">
      <button class="tab-btn active" data-tab="editor">🔲 モザイク・塗りつぶし</button>
      <button class="tab-btn" data-tab="fanza">📸 Fanza変換</button>
    </div>

    <div id="editorTab" class="tab-content active">
    <div class="toolbar">
      <label>
        <input type="file" id="fileInput" accept="image/*">
        📁 画像を開く
      </label>
      <button id="mosaicBtn" class="active">🔲 モザイク</button>
      <button id="fillBtn">🎨 塗りつぶし</button>
      <div class="options">
        <label>
          サイズ: <span id="sizeValue">10</span>
          <input type="range" id="mosaicSize" min="5" max="50" value="10">
        </label>
        <label>
          色:
          <input type="color" id="fillColor" value="#000000">
        </label>
      </div>
      <button id="undoBtn" disabled>↩ 戻す</button>
      <button id="saveBtn" disabled>💾 保存</button>
    </div>

    <div class="canvas-container">
      <canvas id="canvas"></canvas>
      <div class="selection-box" id="selectionBox" style="display:none;"></div>
    </div>

    <div class="info" id="info">画像をドラッグ&ドロップ、または「画像を開く」から選択してください</div>

    <div class="shortcuts">
      <h3>ショートカット</h3>
      <ul>
        <li><kbd>M</kbd> モザイクモード</li>
        <li><kbd>F</kbd> 塗りつぶしモード</li>
        <li><kbd>Ctrl+Z</kbd> 元に戻す</li>
        <li><kbd>Ctrl+S</kbd> 保存</li>
        <li><kbd>↑</kbd><kbd>↓</kbd> サイズ変更</li>
      </ul>
    </div>
    </div><!-- end editorTab -->

    <div id="fanzaTab" class="tab-content">
      <div class="fanza-container">
        <div class="fanza-upload" id="fanzaUpload">
          <p style="font-size: 18px; margin-bottom: 10px;">📁 画像をドラッグ&ドロップ</p>
          <p style="color: #888;">または クリックして選択</p>
          <input type="file" id="fanzaFileInput" accept="image/*" style="display:none;">
        </div>

        <div class="fanza-controls" id="fanzaControls" style="display:none;">
          <label>
            出力形式:
            <select id="fanzaOutputType" style="padding: 8px; background: #0f0f1a; color: #fff; border: 1px solid #333; border-radius: 4px;">
              <option value="2:3">サンプル画像 (2:3)</option>
              <option value="1:1">サムネイル (100x100)</option>
            </select>
          </label>
          <label>
            X位置: <span id="cropXValue">0</span>%
            <input type="range" id="cropX" min="0" max="100" value="50">
          </label>
          <label>
            Y位置: <span id="cropYValue">0</span>%
            <input type="range" id="cropY" min="0" max="100" value="50">
          </label>
          <label>
            品質: <span id="qualityValue">90</span>%
            <input type="range" id="jpgQuality" min="10" max="100" value="90">
          </label>
        </div>

        <div class="fanza-preview" id="fanzaPreview" style="display:none;">
          <div class="fanza-preview-item" style="flex: 1; max-width: 500px;">
            <h4>元画像（クロップ範囲）</h4>
            <div class="crop-area" id="cropArea">
              <canvas id="fanzaSourceCanvas"></canvas>
              <div class="crop-overlay" id="cropOverlay"></div>
            </div>
          </div>
          <div class="fanza-preview-item" style="flex: 0 0 auto;">
            <h4>出力プレビュー</h4>
            <canvas id="fanzaOutputCanvas"></canvas>
            <div class="fanza-info" id="fanzaOutputInfo" style="margin-top: 10px;"></div>
          </div>
        </div>

        <div style="text-align: center; margin-top: 20px;" id="fanzaActions" style="display:none;">
          <button class="fanza-btn fanza-btn-success" id="fanzaDownload" style="display:none;">
            💾 JPGをダウンロード
          </button>
        </div>
      </div>
    </div><!-- end fanzaTab -->
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const fileInput = document.getElementById('fileInput');
    const mosaicBtn = document.getElementById('mosaicBtn');
    const fillBtn = document.getElementById('fillBtn');
    const mosaicSize = document.getElementById('mosaicSize');
    const sizeValue = document.getElementById('sizeValue');
    const fillColor = document.getElementById('fillColor');
    const undoBtn = document.getElementById('undoBtn');
    const saveBtn = document.getElementById('saveBtn');
    const selectionBox = document.getElementById('selectionBox');
    const info = document.getElementById('info');

    let mode = 'mosaic'; // 'mosaic' or 'fill'
    let isDrawing = false;
    let startX, startY;
    let history = [];
    let originalImage = null;

    // Mode switching
    mosaicBtn.addEventListener('click', () => {
      mode = 'mosaic';
      mosaicBtn.classList.add('active');
      fillBtn.classList.remove('active');
    });

    fillBtn.addEventListener('click', () => {
      mode = 'fill';
      fillBtn.classList.add('active');
      mosaicBtn.classList.remove('active');
    });

    // Size slider
    mosaicSize.addEventListener('input', (e) => {
      sizeValue.textContent = e.target.value;
    });

    // File input
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) loadImage(file);
    });

    // Drag and drop
    document.body.addEventListener('dragover', (e) => {
      e.preventDefault();
    });

    document.body.addEventListener('drop', (e) => {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        loadImage(file);
      }
    });

    // Load image
    function loadImage(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);
          originalImage = img;
          history = [];
          saveState();
          saveBtn.disabled = false;
          info.textContent = `${img.width} x ${img.height} | ドラッグで範囲選択 → 自動適用`;
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    // Save state for undo
    function saveState() {
      history.push(canvas.toDataURL());
      if (history.length > 20) history.shift();
      undoBtn.disabled = history.length <= 1;
    }

    // Undo
    function undo() {
      if (history.length > 1) {
        history.pop();
        const img = new Image();
        img.onload = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0);
        };
        img.src = history[history.length - 1];
        undoBtn.disabled = history.length <= 1;
      }
    }

    undoBtn.addEventListener('click', undo);

    // Save image
    function saveImage() {
      const link = document.createElement('a');
      link.download = 'edited-image.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    saveBtn.addEventListener('click', saveImage);

    // Mouse events for selection
    canvas.addEventListener('mousedown', (e) => {
      if (!originalImage) return;
      isDrawing = true;
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      startX = (e.clientX - rect.left) * scaleX;
      startY = (e.clientY - rect.top) * scaleY;
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!isDrawing) return;
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const currentX = (e.clientX - rect.left) * scaleX;
      const currentY = (e.clientY - rect.top) * scaleY;

      // Show selection box
      const boxRect = canvas.getBoundingClientRect();
      const left = Math.min(startX, currentX) / scaleX + boxRect.left - canvas.parentElement.getBoundingClientRect().left;
      const top = Math.min(startY, currentY) / scaleY + boxRect.top - canvas.parentElement.getBoundingClientRect().top;
      const width = Math.abs(currentX - startX) / scaleX;
      const height = Math.abs(currentY - startY) / scaleY;

      selectionBox.style.display = 'block';
      selectionBox.style.left = left + 'px';
      selectionBox.style.top = top + 'px';
      selectionBox.style.width = width + 'px';
      selectionBox.style.height = height + 'px';
    });

    canvas.addEventListener('mouseup', (e) => {
      if (!isDrawing) return;
      isDrawing = false;
      selectionBox.style.display = 'none';

      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const endX = (e.clientX - rect.left) * scaleX;
      const endY = (e.clientY - rect.top) * scaleY;

      const x = Math.min(startX, endX);
      const y = Math.min(startY, endY);
      const w = Math.abs(endX - startX);
      const h = Math.abs(endY - startY);

      if (w > 5 && h > 5) {
        if (mode === 'mosaic') {
          applyMosaic(x, y, w, h);
        } else {
          applyFill(x, y, w, h);
        }
        saveState();
      }
    });

    // Apply mosaic
    function applyMosaic(x, y, w, h) {
      x = Math.floor(x);
      y = Math.floor(y);
      w = Math.floor(w);
      h = Math.floor(h);
      const size = parseInt(mosaicSize.value);
      const imageData = ctx.getImageData(x, y, w, h);
      const data = imageData.data;

      for (let py = 0; py < h; py += size) {
        for (let px = 0; px < w; px += size) {
          let r = 0, g = 0, b = 0, count = 0;

          // Average color in block
          for (let dy = 0; dy < size && py + dy < h; dy++) {
            for (let dx = 0; dx < size && px + dx < w; dx++) {
              const i = ((py + dy) * w + (px + dx)) * 4;
              r += data[i];
              g += data[i + 1];
              b += data[i + 2];
              count++;
            }
          }

          r = Math.round(r / count);
          g = Math.round(g / count);
          b = Math.round(b / count);

          // Apply average color to block
          for (let dy = 0; dy < size && py + dy < h; dy++) {
            for (let dx = 0; dx < size && px + dx < w; dx++) {
              const i = ((py + dy) * w + (px + dx)) * 4;
              data[i] = r;
              data[i + 1] = g;
              data[i + 2] = b;
            }
          }
        }
      }

      ctx.putImageData(imageData, x, y);
    }

    // Apply fill
    function applyFill(x, y, w, h) {
      ctx.fillStyle = fillColor.value;
      ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'm' || e.key === 'M') {
        mosaicBtn.click();
      } else if (e.key === 'f' || e.key === 'F') {
        fillBtn.click();
      } else if (e.ctrlKey && e.key === 'z') {
        e.preventDefault();
        undo();
      } else if (e.ctrlKey && e.key === 's') {
        e.preventDefault();
        if (!saveBtn.disabled) saveImage();
      } else if (e.key === 'ArrowUp') {
        mosaicSize.value = Math.min(50, parseInt(mosaicSize.value) + 1);
        sizeValue.textContent = mosaicSize.value;
      } else if (e.key === 'ArrowDown') {
        mosaicSize.value = Math.max(5, parseInt(mosaicSize.value) - 1);
        sizeValue.textContent = mosaicSize.value;
      }
    });

    // ==================== Tab switching ====================
    const tabBtns = document.querySelectorAll('.tab-btn');
    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(btn.dataset.tab + 'Tab').classList.add('active');
      });
    });

    // ==================== Fanza Image Converter ====================
    const fanzaUpload = document.getElementById('fanzaUpload');
    const fanzaFileInput = document.getElementById('fanzaFileInput');
    const fanzaControls = document.getElementById('fanzaControls');
    const fanzaPreview = document.getElementById('fanzaPreview');
    const fanzaSourceCanvas = document.getElementById('fanzaSourceCanvas');
    const fanzaOutputCanvas = document.getElementById('fanzaOutputCanvas');
    const fanzaSourceCtx = fanzaSourceCanvas.getContext('2d');
    const fanzaOutputCtx = fanzaOutputCanvas.getContext('2d');
    const cropOverlay = document.getElementById('cropOverlay');
    const cropX = document.getElementById('cropX');
    const cropY = document.getElementById('cropY');
    const cropXValue = document.getElementById('cropXValue');
    const cropYValue = document.getElementById('cropYValue');
    const jpgQuality = document.getElementById('jpgQuality');
    const qualityValue = document.getElementById('qualityValue');
    const fanzaOutputType = document.getElementById('fanzaOutputType');
    const fanzaOutputInfo = document.getElementById('fanzaOutputInfo');
    const fanzaDownload = document.getElementById('fanzaDownload');

    let fanzaImage = null;
    let fanzaOutputBlob = null;

    // Upload handlers
    fanzaUpload.addEventListener('click', () => fanzaFileInput.click());
    fanzaFileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) loadFanzaImage(e.target.files[0]);
    });
    fanzaUpload.addEventListener('dragover', (e) => {
      e.preventDefault();
      fanzaUpload.classList.add('dragover');
    });
    fanzaUpload.addEventListener('dragleave', () => {
      fanzaUpload.classList.remove('dragover');
    });
    fanzaUpload.addEventListener('drop', (e) => {
      e.preventDefault();
      fanzaUpload.classList.remove('dragover');
      if (e.dataTransfer.files[0]) loadFanzaImage(e.dataTransfer.files[0]);
    });

    function loadFanzaImage(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          fanzaImage = img;
          // Display source image (scaled for preview)
          const maxPreviewWidth = 450;
          const scale = Math.min(1, maxPreviewWidth / img.width);
          fanzaSourceCanvas.width = img.width * scale;
          fanzaSourceCanvas.height = img.height * scale;
          fanzaSourceCtx.drawImage(img, 0, 0, fanzaSourceCanvas.width, fanzaSourceCanvas.height);

          fanzaControls.style.display = 'flex';
          fanzaPreview.style.display = 'flex';
          fanzaDownload.style.display = 'inline-block';

          updateFanzaCrop();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function updateFanzaCrop() {
      if (!fanzaImage) return;

      const outputType = fanzaOutputType.value;
      const isThumb = outputType === '1:1';

      // Calculate crop dimensions based on aspect ratio
      let targetRatio, outputWidth, outputHeight;
      if (isThumb) {
        targetRatio = 1;
        outputWidth = 100;
        outputHeight = 100;
      } else {
        targetRatio = 2 / 3;
        // For 2:3, we'll output at a reasonable size, max 800 width
        outputWidth = Math.min(800, fanzaImage.width);
        outputHeight = Math.round(outputWidth / targetRatio);
      }

      const imgRatio = fanzaImage.width / fanzaImage.height;
      let cropWidth, cropHeight;

      if (imgRatio > targetRatio) {
        // Image is wider, crop width
        cropHeight = fanzaImage.height;
        cropWidth = cropHeight * targetRatio;
      } else {
        // Image is taller, crop height
        cropWidth = fanzaImage.width;
        cropHeight = cropWidth / targetRatio;
      }

      // Position based on sliders
      const xPercent = parseInt(cropX.value);
      const yPercent = parseInt(cropY.value);
      cropXValue.textContent = xPercent;
      cropYValue.textContent = yPercent;

      const maxOffsetX = fanzaImage.width - cropWidth;
      const maxOffsetY = fanzaImage.height - cropHeight;
      const offsetX = maxOffsetX * (xPercent / 100);
      const offsetY = maxOffsetY * (yPercent / 100);

      // Update overlay on source canvas
      const previewScale = fanzaSourceCanvas.width / fanzaImage.width;
      cropOverlay.style.left = (offsetX * previewScale) + 'px';
      cropOverlay.style.top = (offsetY * previewScale) + 'px';
      cropOverlay.style.width = (cropWidth * previewScale) + 'px';
      cropOverlay.style.height = (cropHeight * previewScale) + 'px';

      // Draw output preview
      fanzaOutputCanvas.width = outputWidth;
      fanzaOutputCanvas.height = outputHeight;
      fanzaOutputCtx.drawImage(
        fanzaImage,
        offsetX, offsetY, cropWidth, cropHeight,
        0, 0, outputWidth, outputHeight
      );

      // Generate JPG and check size
      generateFanzaOutput();
    }

    function generateFanzaOutput() {
      const quality = parseInt(jpgQuality.value) / 100;
      qualityValue.textContent = jpgQuality.value;

      fanzaOutputCanvas.toBlob((blob) => {
        fanzaOutputBlob = blob;
        const sizeMB = (blob.size / (1024 * 1024)).toFixed(2);
        const sizeKB = (blob.size / 1024).toFixed(1);
        const isUnder3MB = blob.size <= 3 * 1024 * 1024;

        const outputType = fanzaOutputType.value;
        const dims = outputType === '1:1' ? '100x100' : `${fanzaOutputCanvas.width}x${fanzaOutputCanvas.height}`;

        fanzaOutputInfo.innerHTML = `
          <strong>サイズ:</strong> ${dims} |
          <strong>ファイル:</strong> ${sizeMB > 1 ? sizeMB + ' MB' : sizeKB + ' KB'}
          ${isUnder3MB ? '✅' : '⚠️ 3MB超過 - 品質を下げてください'}
        `;

        if (!isUnder3MB) {
          fanzaOutputInfo.style.color = '#ff6b6b';
        } else {
          fanzaOutputInfo.style.color = '#aaa';
        }
      }, 'image/jpeg', quality);
    }

    // Event listeners for controls
    cropX.addEventListener('input', updateFanzaCrop);
    cropY.addEventListener('input', updateFanzaCrop);
    jpgQuality.addEventListener('input', updateFanzaCrop);
    fanzaOutputType.addEventListener('change', updateFanzaCrop);

    // Download button
    fanzaDownload.addEventListener('click', () => {
      if (!fanzaOutputBlob) return;

      const outputType = fanzaOutputType.value;
      const filename = outputType === '1:1' ? 'thumbnail_100x100.jpg' : 'fanza_sample.jpg';

      const link = document.createElement('a');
      link.href = URL.createObjectURL(fanzaOutputBlob);
      link.download = filename;
      link.click();
      URL.revokeObjectURL(link.href);
    });

    // Drag crop overlay
    let isDraggingCrop = false;
    let dragStartX, dragStartY, startCropX, startCropY;

    cropOverlay.addEventListener('mousedown', (e) => {
      isDraggingCrop = true;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      startCropX = parseInt(cropX.value);
      startCropY = parseInt(cropY.value);
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDraggingCrop) return;

      const previewScale = fanzaSourceCanvas.width / fanzaImage.width;
      const dx = (e.clientX - dragStartX) / previewScale;
      const dy = (e.clientY - dragStartY) / previewScale;

      const outputType = fanzaOutputType.value;
      const targetRatio = outputType === '1:1' ? 1 : 2 / 3;
      const imgRatio = fanzaImage.width / fanzaImage.height;

      let cropWidth, cropHeight;
      if (imgRatio > targetRatio) {
        cropHeight = fanzaImage.height;
        cropWidth = cropHeight * targetRatio;
      } else {
        cropWidth = fanzaImage.width;
        cropHeight = cropWidth / targetRatio;
      }

      const maxOffsetX = fanzaImage.width - cropWidth;
      const maxOffsetY = fanzaImage.height - cropHeight;

      const newXPercent = Math.max(0, Math.min(100, startCropX + (dx / maxOffsetX) * 100));
      const newYPercent = Math.max(0, Math.min(100, startCropY + (dy / maxOffsetY) * 100));

      cropX.value = Math.round(newXPercent);
      cropY.value = Math.round(newYPercent);

      updateFanzaCrop();
    });

    document.addEventListener('mouseup', () => {
      isDraggingCrop = false;
    });
  </script>
</body>
</html>
